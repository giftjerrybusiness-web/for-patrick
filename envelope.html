<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Me ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{

background:#090909;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.envelope{

position:relative;

width:320px;

height:220px;

cursor:pointer;

transition:.8s;

}

.base{

position:absolute;

bottom:0;

width:100%;

height:150px;

background:#d8c6a2;

border-radius:0 0 12px 12px;

}

.flap{

position:absolute;

top:0;

width:0;

height:0;

border-left:160px solid transparent;

border-right:160px solid transparent;

border-top:110px solid #c8b089;

transform-origin:top;

transition:1s;

}

.seal{

position:absolute;

top:75px;

left:50%;

transform:translateX(-50%);

width:55px;

height:55px;

border-radius:50%;

background:gold;

display:flex;

justify-content:center;

align-items:center;

font-size:24px;

box-shadow:0 0 25px gold;

}

.open .flap{

transform:rotateX(180deg);

}

.open{

transform:translateY(-40px);

}

h2{

position:absolute;

top:70px;

width:100%;

text-align:center;

color:white;

font-family:Georgia;

letter-spacing:3px;

}

</style>

</head>

<body>

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="base"></div>

<div class="seal">🤍</div>

<h2>Open Me</h2>

</div>

<script>

const envelope=document.getElementById("envelope");

envelope.onclick=()=>{

envelope.classList.add("open");

setTimeout(()=>{

window.location.href="letter.html";

},1800);

}

</script>

</body>

</html>
